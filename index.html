<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Space Rocks">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Space Rocks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        canvas { display: block; touch-action: none; user-select: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <input id="nameInput" type="text" inputmode="text" maxlength="12" autocomplete="off"
           autocorrect="off" autocapitalize="off" spellcheck="false"
           style="position:absolute;opacity:0;pointer-events:none;top:50%;left:50%;width:1px;height:1px;">
    <script src="game.js"></script>
</body>
</html>
