<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Space Rocks">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Space Rocks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; background: #000; overflow: hidden;
            overscroll-behavior: none; touch-action: none;
        }
        canvas { display: block; touch-action: none; user-select: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <input id="nameInput" type="text" inputmode="text" maxlength="12" autocomplete="off"
           autocorrect="off" autocapitalize="off" spellcheck="false"
           style="position:absolute;opacity:0;pointer-events:none;top:50%;left:50%;width:1px;height:1px;">
    <div id="iosInstallBanner" style="display:none;position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
         background:rgba(0,0,0,0.85);color:#fff;border:1px solid #44aaff;border-radius:8px;padding:10px 16px;
         font-family:monospace;font-size:13px;align-items:center;gap:12px;z-index:10;max-width:90vw;
         box-shadow:0 0 12px rgba(68,170,255,0.5);">
        <span><strong>Double Tap</strong> for fullscreen play</span>
        <button id="iosInstallDismiss" style="background:none;border:none;color:#ffcc44;font-size:18px;
                cursor:pointer;line-height:1;padding:0 4px;">&times;</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
